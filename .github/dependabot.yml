version: 2
updates:
  - package-ecosystem: 'github-actions'
    open-pull-requests-limit: 3
    labels:
      - D4-dependencies
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "UTC"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        update-types:
          - minor
          - patch
          - major

  - package-ecosystem: 'cargo'
    directory: '/'
    open-pull-requests-limit: 3
    labels:
      - D4-dependencies
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "UTC"
    commit-message:
      prefix: "chore(deps)"
    groups:
      cargo-updates:
        update-types:
          - minor
          - patch
          - major

  - package-ecosystem: 'cargo'
    directory: '/apis/vara-eth'
    open-pull-requests-limit: 3
    labels:
      - D4-dependencies
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "UTC"
    commit-message:
      prefix: "chore(deps)"
    groups:
      cargo-updates:
        update-types:
          - minor
          - patch
          - major

  - package-ecosystem: 'npm'
    directory: '/'
    open-pull-requests-limit: 6
    labels:
      - D4-dependencies
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "UTC"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      development:
        dependency-type: 'development'
        exclude-patterns:
          - '@polkadot/*'
          - 'sails-js*'
        update-types:
          - minor
          - patch
          - major
      production:
        dependency-type: 'production'
        exclude-patterns:
          - '@polkadot/*'
          - 'sails-js*'
        update-types:
          - patch
          - minor
          - major
      polkadot:
        patterns:
          - '@polkadot/*'
      sails:
        patterns:
          - 'sails-js*'
