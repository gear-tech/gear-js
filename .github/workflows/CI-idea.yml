name: 'CI-idea'

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      force:
        type: boolean
        default: false
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - "idea/**"
      - package.json
  workflow_dispatch:

env:
  BINARYEN_VERSION: version_111

jobs:
  guard:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - run: echo "Not a draft PR, proceeding"

  lint:
    runs-on: ubuntu-latest
    needs: [guard]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup

      - name: 'Run linter'
        run: yarn check:idea

  changes:
    runs-on: ubuntu-latest
    needs: [guard]
    outputs:
      gear: ${{ steps.changes.outputs.gear }}
      vara-eth: ${{ steps.changes.outputs.vara-eth }}
      vara-eth-migrations: ${{ steps.changes.outputs.vara-eth-migrations }}
      vara-eth-dump: ${{ steps.changes.outputs.vara-eth-dump }}
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1

      - name: 'Checkout'
        uses: actions/checkout@v7

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
              gear:
                - 'idea/gear/**'
                - package.json
              vara-eth:
                - 'idea/vara-eth/**'
                - package.json
              vara-eth-migrations:
                - 'idea/vara-eth/indexer-db/db/migrations/**'
              vara-eth-dump:
                - 'idea/vara-eth/explorer/dump.sql'

  check-explorer-dump:
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.vara-eth-migrations == 'true' && needs.changes.outputs.vara-eth-dump == 'false' }}
    steps:
      - name: 'Migrations changed without dump.sql update'
        run: |
          echo "::error::Migration files changed but dump.sql was not regenerated."
          echo "Run idea/vara-eth/explorer/scripts/generate-dump.sh and commit the updated dump.sql."
          exit 1

  build-gear-idea:
    runs-on: ubuntu-latest
    needs: ['changes']
    if: ${{ needs.changes.outputs.gear == 'true' || inputs.force }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup

      - name: 'Build backend'
        run: yarn build:gear-idea-backend

      - name: 'Build frontend'
        run: yarn build:gear-idea-frontend

  build-vara-eth-idea:
    runs-on: ubuntu-latest
    needs: ['changes']
    if: ${{ needs.changes.outputs.vara-eth == 'true' || inputs.force }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup

      - name: 'Build frontend'
        run: yarn build:varaeth-idea-frontend

      - name: 'Build indexer'
        run: yarn build:varaeth-idea-indexer

      - name: 'Build explorer'
        run: yarn build:varaeth-idea-explorer

  test-vara-eth-idea-backend:
    runs-on: ubuntu-latest
    needs: ['build-vara-eth-idea']
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1

      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup

      - name: 'Build'
        run: yarn run build:varaeth-idea-explorer

      - name: 'Test: explorer'
        timeout-minutes: 5
        run: yarn test:varaeth-idea-explorer

  test-gear-idea-backend:
    runs-on: ubuntu-latest
    needs: ['build-gear-idea']
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup

      - name: 'Build'
        run: yarn build:gear-idea-backend

      - name: 'Test: meta-storage'
        timeout-minutes: 3
        run: yarn test:gear-idea-meta-storage

      - name: 'Test: faucet'
        timeout-minutes: 3
        run: yarn test:gear-idea-faucet

      - name: 'Test: explorer'
        timeout-minutes: 3
        run: yarn test:gear-idea-explorer

  check-dockerfiles:
    runs-on: ubuntu-latest
    needs: [guard]
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1

      - name: 'Checkout'
        uses: actions/checkout@v7

      - name: 'Check for changed Dockerfiles'
        id: changed-dockerfiles
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **/Dockerfile

      - name: 'Build changed Dockerfiles'
        if: steps.changed-dockerfiles.outputs.any_changed == 'true'
        run: |
          for dockerfile in ${{ steps.changed-dockerfiles.outputs.all_changed_files }}; do
            echo "Building $dockerfile"
            docker build -f "$dockerfile" .
          done
