name: Build and Deploy Gear Idea

on:
  push:
    branches: [main, master]
    paths:
      - 'idea/gear/**'
    tags: ["gear-idea-v*"]
  workflow_dispatch:
    inputs:
      env:
        type: choice
        description: Target environment
        required: false
        options:
          - dev
          - stg
          - prod
      deploy_indexer:
        type: boolean
        description: Deploy indexer (mainnet + testnet)
        default: true
      deploy_explorer:
        type: boolean
        description: Deploy explorer
        default: true
      deploy_faucet:
        type: boolean
        description: Deploy faucet
        default: true
      deploy_meta-storage:
        type: boolean
        description: Deploy meta-storage
        default: true
      deploy_frontend:
        type: boolean
        description: Deploy frontend
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  actions: write
  id-token: write

jobs:
  deploy_indexer:
    uses: gear-ops/actions/.github/workflows/build-deploy.yaml@main
    with:
      argocd_server: ${{ vars.ARGOCD_SERVER }}
      vault_server: ${{ vars.VAULT_SERVER }}
      env: ${{ inputs.env }}
      app: gear-idea
      component: indexer-mainnet
      extra_components: |
        indexer-testnet
      registry: ghcr.io/gear-tech/gear-idea-indexer
      dockerfile: idea/gear/squid/Dockerfile
      context: .
      paths_filter: |
        idea/gear/squid/**
        idea/gear/common/**
        idea/gear/indexer-db/**
    secrets:
      WORKLOADS_REPO_TOKEN: ${{ secrets.WORKLOADS_REPO_TOKEN }}
      ARGOCD_TOKEN:         ${{ secrets.ARGOCD_TOKEN }}

  deploy_explorer:
    uses: gear-ops/actions/.github/workflows/build-deploy.yaml@main
    with:
      argocd_server: ${{ vars.ARGOCD_SERVER }}
      vault_server: ${{ vars.VAULT_SERVER }}
      env: ${{ inputs.env }}
      app: gear-idea
      component: explorer
      registry: ghcr.io/gear-tech/gear-idea-explorer
      dockerfile: idea/gear/explorer/Dockerfile
      context: .
      paths_filter: |
        idea/gear/explorer/**
        idea/gear/common/**
        idea/gear/indexer-db/**
    secrets:
      WORKLOADS_REPO_TOKEN: ${{ secrets.WORKLOADS_REPO_TOKEN }}
      ARGOCD_TOKEN:         ${{ secrets.ARGOCD_TOKEN }}

  deploy_faucet:
    uses: gear-ops/actions/.github/workflows/build-deploy.yaml@main
    with:
      argocd_server: ${{ vars.ARGOCD_SERVER }}
      vault_server: ${{ vars.VAULT_SERVER }}
      env: ${{ inputs.env }}
      app: gear-idea
      component: faucet
      registry: ghcr.io/gear-tech/gear-idea-faucet
      dockerfile: idea/gear/faucet/Dockerfile
      context: .
      paths_filter: |
        idea/gear/faucet/**
        idea/gear/common/**
        idea/gear/indexer-db/**
    secrets:
      WORKLOADS_REPO_TOKEN: ${{ secrets.WORKLOADS_REPO_TOKEN }}
      ARGOCD_TOKEN:         ${{ secrets.ARGOCD_TOKEN }}

  deploy_meta-storage:
    uses: gear-ops/actions/.github/workflows/build-deploy.yaml@main
    with:
      argocd_server: ${{ vars.ARGOCD_SERVER }}
      vault_server: ${{ vars.VAULT_SERVER }}
      env: ${{ inputs.env }}
      app: gear-idea
      component: meta-storage
      registry: ghcr.io/gear-tech/gear-idea-meta-storage
      dockerfile: idea/gear/meta-storage/Dockerfile
      context: .
      paths_filter: |
        idea/gear/meta-storage/**
        idea/gear/common/**
    secrets:
      WORKLOADS_REPO_TOKEN: ${{ secrets.WORKLOADS_REPO_TOKEN }}
      ARGOCD_TOKEN:         ${{ secrets.ARGOCD_TOKEN }}

  deploy_frontend:
    uses: gear-ops/actions/.github/workflows/build-deploy.yaml@main
    with:
      argocd_server: ${{ vars.ARGOCD_SERVER }}
      vault_server: ${{ vars.VAULT_SERVER }}
      env: ${{ inputs.env }}
      app: gear-idea
      component: frontend
      registry: ghcr.io/gear-tech/gear-idea-frontend
      dockerfile: idea/gear/frontend/Dockerfile
      context: .
      paths_filter: |
        idea/gear/frontend/**
    secrets:
      WORKLOADS_REPO_TOKEN: ${{ secrets.WORKLOADS_REPO_TOKEN }}
      ARGOCD_TOKEN:         ${{ secrets.ARGOCD_TOKEN }}
