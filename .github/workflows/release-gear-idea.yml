name: 'Gear Idea Release'

on:
  push:
    branches: ['main', 'prod/gear-idea']
    paths:
      - idea/gear/**
  workflow_dispatch:
    inputs:
      service:
        type: choice
        description: Service to release
        options:
          - frontend
          - faucet
          - squid
          - meta-storage
          - explorer
          - all
          - backend
        required: true
      environment:
        type: choice
        description: Environment to deploy
        options:
          - gear-idea-staging
          - gear-idea-production
        required: true
        default: gear-idea-staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}

permissions:
  contents: read

jobs:
  set-env-tag:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.get_env.outputs.environment }}
    permissions:
      contents: read
    steps:
      - name: Get environment
        id: get_env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            if [[ "${{ github.ref }}" == "refs/heads/prod/gear-idea" ]]; then
              echo "environment=gear-idea-production" >> $GITHUB_OUTPUT
            else
              echo "environment=gear-idea-staging" >> $GITHUB_OUTPUT
            fi
          fi

  check-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.should-build.outputs.frontend }}
      faucet: ${{ steps.should-build.outputs.faucet }}
      meta-storage: ${{ steps.should-build.outputs.meta-storage }}
      squid: ${{ steps.should-build.outputs.squid }}
      explorer: ${{ steps.should-build.outputs.explorer }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect file changes
        id: changes
        if: ${{ github.event_name == 'push' && github.ref != 'refs/heads/stable' }}
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - idea/gear/frontend/**
            faucet:
              - idea/gear/faucet/**
              - idea/gear/common/**
              - idea/gear/indexer-db/**
            meta-storage:
              - idea/gear/meta-storage/**
              - idea/gear/common/**
            squid:
              - idea/gear/squid/**
              - idea/gear/common/**
              - idea/gear/indexer-db/**
            explorer:
              - idea/gear/explorer/**
              - idea/gear/common/**
              - idea/gear/indexer-db/**

      - name: Determine what should be built
        id: should-build
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT="${{ github.event.inputs.service }}"
            [[ "$INPUT" == "frontend" || "$INPUT" == "all" ]] && echo "frontend=true" >> "$GITHUB_OUTPUT" || echo "frontend=false" >> "$GITHUB_OUTPUT"
            [[ "$INPUT" == "faucet" || "$INPUT" == "all" || "$INPUT" == "backend" ]] && echo "faucet=true" >> "$GITHUB_OUTPUT" || echo "faucet=false" >> "$GITHUB_OUTPUT"
            [[ "$INPUT" == "meta-storage" || "$INPUT" == "all" || "$INPUT" == "backend" ]] && echo "meta-storage=true" >> "$GITHUB_OUTPUT" || echo "meta-storage=false" >> "$GITHUB_OUTPUT"
            [[ "$INPUT" == "squid" || "$INPUT" == "all" || "$INPUT" == "backend" ]] && echo "squid=true" >> "$GITHUB_OUTPUT" || echo "squid=false" >> "$GITHUB_OUTPUT"
            [[ "$INPUT" == "explorer" || "$INPUT" == "all" || "$INPUT" == "backend" ]] && echo "explorer=true" >> "$GITHUB_OUTPUT" || echo "explorer=false" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/stable" ]]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "faucet=true" >> "$GITHUB_OUTPUT"
            echo "meta-storage=true" >> "$GITHUB_OUTPUT"
            echo "squid=true" >> "$GITHUB_OUTPUT"
            echo "explorer=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=${{ steps.changes.outputs.frontend }}" >> "$GITHUB_OUTPUT"
            echo "faucet=${{ steps.changes.outputs.faucet }}" >> "$GITHUB_OUTPUT"
            echo "meta-storage=${{ steps.changes.outputs.meta-storage }}" >> "$GITHUB_OUTPUT"
            echo "squid=${{ steps.changes.outputs.squid }}" >> "$GITHUB_OUTPUT"
            echo "explorer=${{ steps.changes.outputs.explorer }}" >> "$GITHUB_OUTPUT"
          fi

  build-frontend-image:
    runs-on: ubuntu-latest
    needs: [set-env-tag, check-changes]
    if: ${{ needs.check-changes.outputs.frontend == 'true' }}
    environment: ${{ needs.set-env-tag.outputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the github container registry
        uses: docker/login-action@master
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push "gear-idea-frontend" Docker image
        uses: docker/build-push-action@master
        with:
          file: idea/gear/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-gear-idea-frontend:${{ needs.set-env-tag.outputs.environment }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-gear-idea-frontend:${{ needs.set-env-tag.outputs.environment }}-${{ github.sha }}
          build-args: |
            VITE_NODE_ADDRESS=${{ secrets.VITE_NODE_ADDRESS }}
            VITE_DEFAULT_TRANSFER_BALANCE_VALUE=${{ secrets.VITE_DEFAULT_TRANSFER_BALANCE_VALUE }}
            VITE_TURNSTILE_SITEKEY=${{ secrets.VITE_TURNSTILE_SITEKEY }}
            VITE_NODES_API_URL=${{ secrets.VITE_NODES_API_URL }}
            VITE_FAUCET_API_URL=${{ secrets.VITE_FAUCET_API_URL }}
            VITE_METADATA_STORAGE_API_URL=${{ secrets.VITE_METADATA_STORAGE_API_URL }}
            VITE_INDEXER_API_URL=${{ secrets.VITE_INDEXER_API_URL }}
            VITE_CODE_VERIFIER_API_URL=${{ secrets.VITE_CODE_VERIFIER_API_URL }}
            VITE_VFT_WHITELIST_API_URL=${{ secrets.VITE_VFT_WHITELIST_API_URL }}

  build-faucet-image:
    runs-on: ubuntu-latest
    needs: [set-env-tag, check-changes]
    if: ${{ needs.check-changes.outputs.faucet == 'true' }}
    environment: ${{ needs.set-env-tag.outputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the github container registry
        uses: docker/login-action@master
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push "gear-idea-faucet" Docker image
        uses: docker/build-push-action@master
        with:
          file: idea/gear/faucet/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-gear-idea-faucet:${{ needs.set-env-tag.outputs.environment }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-gear-idea-faucet:${{ needs.set-env-tag.outputs.environment }}-${{ github.sha }}

  build-meta-storage-image:
    runs-on: ubuntu-latest
    needs: [set-env-tag, check-changes]
    if: ${{ needs.check-changes.outputs.meta-storage == 'true' }}
    environment: ${{ needs.set-env-tag.outputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the github container registry
        uses: docker/login-action@master
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push "gear-idea-meta-storage" image
        uses: docker/build-push-action@master
        with:
          file: idea/gear/meta-storage/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-gear-idea-meta-storage:${{ needs.set-env-tag.outputs.environment }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-gear-idea-meta-storage:${{ needs.set-env-tag.outputs.environment }}-${{ github.sha }}

  build-squid-image:
    runs-on: ubuntu-latest
    needs: [set-env-tag, check-changes]
    if: ${{ needs.check-changes.outputs.squid == 'true' }}
    environment: ${{ needs.set-env-tag.outputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the github container registry
        uses: docker/login-action@master
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push "gear-idea-squid" image
        uses: docker/build-push-action@master
        with:
          file: idea/gear/squid/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-gear-idea-squid:${{ needs.set-env-tag.outputs.environment }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-gear-idea-squid:${{ needs.set-env-tag.outputs.environment }}-${{ github.sha }}

  build-explorer-image:
    runs-on: ubuntu-latest
    needs: [set-env-tag, check-changes]
    if: ${{ needs.check-changes.outputs.explorer == 'true' }}
    environment: ${{ needs.set-env-tag.outputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the github container registry
        uses: docker/login-action@master
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push "gear-idea-explorer" image
        uses: docker/build-push-action@master
        with:
          file: idea/gear/explorer/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-gear-idea-explorer:${{ needs.set-env-tag.outputs.environment }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-gear-idea-explorer:${{ needs.set-env-tag.outputs.environment }}-${{ github.sha }}

  deploy-frontend:
    needs: [build-frontend-image, set-env-tag]
    runs-on: ubuntu-latest
    environment: ${{ needs.set-env-tag.outputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to k8s
        uses: sergeyfilyanin/kubectl-aws-eks@master
        with:
          args: rollout restart deployment ${{ vars.FRONTEND_DEPLOYMENTS }} -n ${{ vars.NAMESPACE }}

  deploy-faucet:
    needs: [build-faucet-image, set-env-tag]
    runs-on: ubuntu-latest
    environment: ${{ needs.set-env-tag.outputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to k8s
        uses: sergeyfilyanin/kubectl-aws-eks@master
        with:
          args: rollout restart deployment ${{ vars.FAUCET_DEPLOYMENTS }} -n ${{ vars.NAMESPACE }}

  deploy-meta-storage:
    needs: [build-meta-storage-image, set-env-tag]
    runs-on: ubuntu-latest
    environment: ${{ needs.set-env-tag.outputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to k8s
        uses: sergeyfilyanin/kubectl-aws-eks@master
        with:
          args: rollout restart deployment ${{ vars.META_STORAGE_DEPLOYMENTS }} -n ${{ vars.NAMESPACE }}

  deploy-squid:
    needs: [build-squid-image, set-env-tag]
    runs-on: ubuntu-latest
    environment: ${{ needs.set-env-tag.outputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to k8s
        uses: sergeyfilyanin/kubectl-aws-eks@master
        with:
          args: rollout restart deployment ${{ vars.SQUID_DEPLOYMENTS }} -n ${{ vars.NAMESPACE }}

  deploy-explorer:
    needs: [build-explorer-image, set-env-tag]
    runs-on: ubuntu-latest
    environment: ${{ needs.set-env-tag.outputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to k8s
        uses: sergeyfilyanin/kubectl-aws-eks@master
        with:
          args: rollout restart deployment ${{ vars.EXPLORER_DEPLOYMENTS }} -n ${{ vars.NAMESPACE }}
