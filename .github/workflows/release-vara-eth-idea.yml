name: 'Vara.Eth Idea Release'

on:
  push:
    branches: ['main', 'prod/vara-eth-idea']
    paths:
      - idea/vara-eth/**
  workflow_dispatch:
    inputs:
      service:
        type: choice
        description: Service to release
        options:
          - frontend
          - indexer
          - upload-code-service
          - all
        required: true
      environment:
        type: choice
        description: Environment to deploy
        options:
          - vara-eth-idea-staging
          - vara-eth-idea-production
        required: true
        default: vara-eth-idea-staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}

permissions:
  contents: read

jobs:
  set-env-tag:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.get_env.outputs.environment }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get environment
        id: get_env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            # For push events, determine environment based on branch
            if [[ "${{ github.ref }}" == "refs/heads/prod/vara-eth-idea" ]]; then
              echo "environment=vara-eth-idea-production" >> $GITHUB_OUTPUT
            else
              echo "environment=vara-eth-idea-staging" >> $GITHUB_OUTPUT
            fi
          fi

  check-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.should-build.outputs.frontend }}
      indexer: ${{ steps.should-build.outputs.indexer }}
      upload-code-service: ${{ steps.should-build.outputs.upload-code-service }}
    steps:
      - uses: actions/checkout@v6

      - name: Check frontend changes
        id: frontend
        uses: dorny/paths-filter@v4
        with:
          base: ${{ github.event.before }}
          filters: |
            changed:
              - 'idea/vara-eth/frontend/**'

      - name: Check indexer changes
        id: indexer
        uses: dorny/paths-filter@v4
        with:
          base: ${{ github.event.before }}
          filters: |
            changed:
              - 'idea/vara-eth/indexer/**'

      - name: Check upload-code-service changes
        id: upload-code-service
        uses: dorny/paths-filter@v4
        with:
          base: ${{ github.event.before }}
          filters: |
            changed:
              - 'idea/vara-eth/upload-code-service/**'

      - name: Determine what should be built
        id: should-build
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # For manual trigger, check the input
            if [[ "${{ github.event.inputs.service }}" == "frontend" || "${{ github.event.inputs.service }}" == "all" ]]; then
              echo "frontend=true" >> "$GITHUB_OUTPUT"
            else
              echo "frontend=false" >> "$GITHUB_OUTPUT"
            fi

            if [[ "${{ github.event.inputs.service }}" == "indexer" || "${{ github.event.inputs.service }}" == "all" ]]; then
              echo "indexer=true" >> "$GITHUB_OUTPUT"
            else
              echo "indexer=false" >> "$GITHUB_OUTPUT"
            fi

            if [[ "${{ github.event.inputs.service }}" == "upload-code-service" || "${{ github.event.inputs.service }}" == "all" ]]; then
              echo "upload-code-service=true" >> "$GITHUB_OUTPUT"
            else
              echo "upload-code-service=false" >> "$GITHUB_OUTPUT"
            fi
          else
            # For push events, use the file change detection
            echo "frontend=${{ steps.frontend.outputs.changed }}" >> "$GITHUB_OUTPUT"
            echo "indexer=${{ steps.indexer.outputs.changed }}" >> "$GITHUB_OUTPUT"
            echo "upload-code-service=${{ steps.upload-code-service.outputs.changed }}" >> "$GITHUB_OUTPUT"
          fi

  build-indexer-image:
    runs-on: ubuntu-latest
    needs: [set-env-tag, check-changes]
    if: ${{ needs.check-changes.outputs.indexer == 'true' }}
    environment: ${{ needs.set-env-tag.outputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the github container registry
        uses: docker/login-action@master
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push "vara-eth-idea-indexer" image
        uses: docker/build-push-action@master
        with:
          file: idea/vara-eth/indexer/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-vara-eth-idea-indexer:${{ needs.set-env-tag.outputs.environment }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-vara-eth-idea-indexer:${{ needs.set-env-tag.outputs.environment }}-${{ github.sha }}

  build-frontend-image:
    runs-on: ubuntu-latest
    needs: [set-env-tag, check-changes]
    if: ${{ needs.check-changes.outputs.frontend == 'true' }}
    environment: ${{ needs.set-env-tag.outputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the github container registry
        uses: docker/login-action@master
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push "vara-eth-idea-frontend" Docker image
        uses: docker/build-push-action@master
        with:
          file: idea/vara-eth/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-vara-eth-idea-frontend:${{ needs.set-env-tag.outputs.environment }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-vara-eth-idea-frontend:${{ needs.set-env-tag.outputs.environment }}-${{ github.sha }}
          build-args: |
            VITE_WALLET_CONNECT_PROJECT_ID=${{ secrets.VITE_WALLET_CONNECT_PROJECT_ID }}
            VITE_VARA_ETH_NODE_ADDRESSES_TESTNET=${{ secrets.VITE_VARA_ETH_NODE_ADDRESSES_TESTNET }}
            VITE_VARA_ETH_NODE_ADDRESSES_MAINNET=${{ secrets.VITE_VARA_ETH_NODE_ADDRESSES_MAINNET }}
            VITE_ETH_NODE_ADDRESS_TESTNET=${{ secrets.VITE_ETH_NODE_ADDRESS_TESTNET }}
            VITE_ETH_NODE_ADDRESS_MAINNET=${{ secrets.VITE_ETH_NODE_ADDRESS_MAINNET }}
            VITE_ETH_CHAIN_ID_TESTNET=${{ secrets.VITE_ETH_CHAIN_ID_TESTNET }}
            VITE_ETH_CHAIN_ID_MAINNET=${{ secrets.VITE_ETH_CHAIN_ID_MAINNET }}
            VITE_EXPLORER_URL_TESTNET=${{ secrets.VITE_EXPLORER_URL_TESTNET }}
            VITE_EXPLORER_URL_MAINNET=${{ secrets.VITE_EXPLORER_URL_MAINNET }}
            VITE_ROUTER_CONTRACT_ADDRESS_TESTNET=${{ secrets.VITE_ROUTER_CONTRACT_ADDRESS_TESTNET }}
            VITE_ROUTER_CONTRACT_ADDRESS_MAINNET=${{ secrets.VITE_ROUTER_CONTRACT_ADDRESS_MAINNET }}
            VITE_METADATA_STORAGE_API_URL=${{ secrets.VITE_METADATA_STORAGE_API_URL }}

  deploy-indexer:
    needs: [build-indexer-image, set-env-tag]
    runs-on: ubuntu-latest
    environment: ${{ needs.set-env-tag.outputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to k8s
        uses: sergeyfilyanin/kubectl-aws-eks@master
        with:
          args: rollout restart deployment ${{ vars.INDEXER_DEPLOYMENTS }} -n ${{ vars.NAMESPACE }}

  deploy-frontend:
    needs: [build-frontend-image, set-env-tag]
    runs-on: ubuntu-latest
    environment: ${{ needs.set-env-tag.outputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to k8s
        uses: sergeyfilyanin/kubectl-aws-eks@master
        with:
          args: rollout restart deployment ${{ vars.FRONTEND_DEPLOYMENTS }} -n ${{ vars.NAMESPACE }}

  deploy-upload-code-service:
    needs: [check-changes, set-env-tag]
    if: ${{ needs.check-changes.outputs.upload-code-service == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.set-env-tag.outputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Install dependencies
        run: yarn workspaces focus gear-js @vara-eth/api upload-code-service

      - name: Build
        run: yarn workspace upload-code-service run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy handler Lambda
        run: aws lambda update-function-code --function-name ${{ vars.UPLOAD_CODE_HANDLER_FUNCTION_NAME }} --zip-file fileb://idea/vara-eth/upload-code-service/dist/handler.zip

      - name: Deploy worker Lambda
        run: aws lambda update-function-code --function-name ${{ vars.UPLOAD_CODE_WORKER_FUNCTION_NAME }} --zip-file fileb://idea/vara-eth/upload-code-service/dist/worker.zip
